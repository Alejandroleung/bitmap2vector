<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>远程指令</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0f0a06;color:#e5d5c0;font-family:-apple-system,'Segoe UI',sans-serif;min-height:100dvh;display:flex;flex-direction:column;padding:12px}
h1{font-size:18px;color:#f97316;margin-bottom:8px;font-weight:600}
#messages{flex:1;overflow-y:auto;padding:8px 0;display:flex;flex-direction:column;gap:8px;min-height:0}
.msg{background:#1a120c;border:1px solid #2a1f15;border-radius:10px;padding:10px 12px;max-width:90%;word-wrap:break-word;font-size:14px;line-height:1.5}
.msg.user{background:#1a120c;align-self:flex-end;border-color:#f9731644}
.msg.user::before{content:"→ ";color:#f97316}
.msg.response{background:#14100b;align-self:flex-start;border-color:#22c55e44}
.msg.response::before{content:"← ";color:#22c55e}
.msg .time{font-size:10px;color:#666;margin-top:4px}
.pending{opacity:.5}
#input-area{display:flex;gap:8px;padding:8px 0 0;border-top:1px solid #2a1f15;margin-top:8px}
#input{flex:1;background:#1a120c;border:1px solid #2a1f15;border-radius:10px;padding:10px 12px;color:#e5d5c0;font-size:14px;outline:none}
#input:focus{border-color:#f97316}
#send{background:#f97316;color:#0f0a06;border:none;border-radius:10px;padding:10px 16px;font-size:14px;font-weight:600;cursor:pointer}
#send:active{opacity:.8}
#status{font-size:11px;color:#666;margin-top:6px;text-align:center}
</style>
</head>
<body>
<h1>远程指令</h1>
<div id="messages"></div>
<div id="input-area">
<input id="input" type="text" placeholder="输入指令..." autocomplete="off">
<button id="send">发送</button>
</div>
<div id="status">已连接</div>
<script>
let lastId = 0;
const msgDiv = document.getElementById("messages");
const input = document.getElementById("input");
input.focus();

function addMsg(text, type) {
  const d = document.createElement("div");
  d.className = "msg " + type;
  d.textContent = text;
  if (type === "user") d.classList.add("pending");
  msgDiv.appendChild(d);
  msgDiv.scrollTop = msgDiv.scrollHeight;
  return d;
}

async function send() {
  const text = input.value.trim();
  if (!text) return;
  input.value = "";
  const el = addMsg(text, "user");
  try {
    const r = await fetch("/api/send", {method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({text})});
    const j = await r.json();
    if (j.ok) el.dataset.id = j.id;
    el.classList.remove("pending");
  } catch(e) {
    el.classList.remove("pending");
    document.getElementById("status").textContent = "发送失败";
  }
}

input.addEventListener("keydown", e => { if (e.key === "Enter") send(); });
document.getElementById("send").addEventListener("click", send);

async function pollResponses() {
  try {
    const r = await fetch("/api/pending-response");
    const items = await r.json();
    for (const item of items) {
      const existing = document.querySelector(`[data-id="${item.id}"]`);
      if (existing) existing.classList.remove("pending");
      addMsg(item.response, "response").dataset.id = item.id;
    }
  } catch(e) {}
  setTimeout(pollResponses, 2000);
}
pollResponses();
</script>
</body>
</html>
